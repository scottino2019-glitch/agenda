<!doctype html>
<html lang="it" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Personale</title>
  <script src="https://cdn.tailwindcss.com"></script>
 <link href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Permanent+Marker&display=swap" rel="stylesheet">
    
  <style>
    body {
      box-sizing: border-box;
    }

    .agenda-container {
      perspective: 2000px;
      transform-style: preserve-3d;
    }

    .page {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      transform-origin: left center;
      transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    .page.flipped {
      transform: rotateY(-180deg);
    }

    .page-content {
      background: linear-gradient(to right, #f8f6f0 0%, #faf9f5 2%, #fdfcfa 100%);
      background-image: 
        linear-gradient(to right, #f8f6f0 0%, #faf9f5 2%, #fdfcfa 100%),
        repeating-linear-gradient(transparent, transparent 31px, #e8e6e0 31px, #e8e6e0 32px);
      background-size: 100% 100%, 100% 32px;
    }

    .page-lines {
      background-image: repeating-linear-gradient(
        transparent,
        transparent 31px,
        #d4d0c8 31px,
        #d4d0c8 32px
      );
      background-size: 100% 32px;
      background-position: 0 20px;
    }

    .spine-shadow {
      box-shadow: inset 8px 0 15px -5px rgba(0,0,0,0.15);
    }

    .page-curl {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.03) 50%);
      border-radius: 0 0 3px 0;
    }

    .leather-texture {
      background: linear-gradient(135deg, #8b4513 0%, #654321 50%, #8b4513 100%);
      box-shadow: 
        inset 0 2px 4px rgba(255,255,255,0.1),
        inset 0 -2px 4px rgba(0,0,0,0.2),
        0 10px 40px rgba(0,0,0,0.3);
    }

    .gold-emboss {
      color: #d4af37;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3), 0 0 10px rgba(212,175,55,0.3);
    }

    .handwriting {
      font-family: 'Caveat', cursive;
    }

    .serif-font {
      font-family: 'Crimson Pro', serif;
    }

    .date-header {
      border-bottom: 2px solid #8b4513;
      color: #654321;
    }

    .nav-btn {
      transition: all 0.3s ease;
    }

    .nav-btn:hover:not(:disabled) {
      transform: scale(1.1);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .delete-btn {
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .page-wrapper:hover .delete-btn {
      opacity: 1;
    }

    .ribbon {
      position: absolute;
      top: 0;
      right: 30px;
      width: 8px;
      height: 80px;
      background: linear-gradient(to bottom, #c41e3a, #8b0000);
      border-radius: 0 0 4px 4px;
      box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      z-index: 100;
    }

    .cover-decoration {
      border: 2px solid #d4af37;
      box-shadow: inset 0 0 0 4px #654321, inset 0 0 0 6px #d4af37;
    }

    @keyframes pageFlip {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(-180deg); }
    }

    .confirm-delete {
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .toast {
      animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s;
    }

    @keyframes slideIn {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
.titolo-agenda {
  font-family: 'Permanent Marker', cursive;
  font-size: 3rem; /* Molto più grande */
  line-height: 1;
  letter-spacing: 2px;
  transform: rotate(-1deg); /* Un leggero tocco "manuale" */
}

/* Per schermi piccoli, lo riduciamo un po' */
@media (max-width: 768px) {
  .titolo-agenda {
    font-size: 2rem;
  }
}

  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gradient-to-br from-amber-50 via-orange-50 to-yellow-50 overflow-auto">
  <div id="app" class="h-full flex flex-col items-center justify-center p-4 md:p-8"><!-- Header -->
   <div class="w-full max-w-4xl mb-4 flex justify-between items-center">
    <h1 class="titolo-agenda text-amber-900">La Mia Agenda</h1>

    <div class="flex gap-2"><button id="bookmarks-toggle" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg shadow-md transition-all flex items-center gap-2 text-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
      </svg><span id="bookmarks-count">0</span> </button> <button id="add-page-btn" class="bg-amber-700 hover:bg-amber-800 text-white px-4 py-2 rounded-lg shadow-md transition-all flex items-center gap-2 text-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg> Nuova Pagina </button>
    </div>
   </div><!-- Agenda Book -->
   <div class="relative w-full max-w-4xl" style="height: 650px;"><!-- Book Cover (Back) -->
    <div class="absolute inset-0 leather-texture rounded-r-lg rounded-l-sm"></div><!-- Book Spine -->
    <div class="absolute left-0 top-0 bottom-0 w-8 bg-gradient-to-r from-amber-950 to-amber-900 rounded-l-sm"></div><!-- Pages Container -->
    <div id="pages-container" class="agenda-container absolute inset-0 ml-8 rounded-r-lg overflow-hidden"><!-- Pages will be rendered here -->
    </div><!-- Ribbon Bookmark -->
    <div class="ribbon"></div><!-- Cover (Front) - shown when no pages or on cover -->
    <div id="book-cover" class="absolute inset-0 ml-8 leather-texture rounded-r-lg flex flex-col items-center justify-center p-8 transition-opacity duration-500">
     <div class="cover-decoration rounded-lg p-8 w-full max-w-xs">
      <div class="text-center">
       <div class="gold-emboss text-4xl serif-font font-semibold mb-2">
        📔
       </div>
       <h2 class="titolo-agenda gold-emboss text-2xl serif-font font-semibold mb-4">La Mia Agenda</h2>
       <div class="gold-emboss text-sm indie-flower" id="cover-year"></div>
      </div>
     </div>
     <p class="text-amber-200 text-sm mt-6 indie-flower">Clicca per aprire</p>
    </div>
   </div><!-- Navigation -->
   <div class="flex items-center gap-4 mt-6"><button id="prev-btn" class="nav-btn bg-amber-700 hover:bg-amber-800 disabled:bg-amber-400 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center">
     <svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
     </svg></button>
    <div class="text-center min-w-32"><span id="page-indicator" class="serif-font text-amber-800 text-lg">Nessuna pagina</span>
    </div><button id="next-btn" class="nav-btn bg-amber-700 hover:bg-amber-800 disabled:bg-amber-400 text-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center">
     <svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
     </svg></button>
   </div><!-- Page Count & Delete All -->
   <div class="flex items-center gap-4 mt-4"><span id="total-pages" class="text-amber-700 text-sm serif-font"></span> <button id="delete-all-btn" class="text-red-600 hover:text-red-800 text-sm underline transition-colors hidden"> Elimina tutte le pagine </button>
   </div><!-- Toast Container -->
   <div id="toast-container" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50"></div><!-- Bookmarks Panel -->
   <div id="bookmarks-panel" class="fixed top-0 right-0 h-full w-80 bg-amber-50 shadow-2xl transform translate-x-full transition-transform duration-300 z-40 overflow-y-auto">
    <div class="p-6">
     <div class="flex justify-between items-center mb-6">
      <h2 class="serif-font text-2xl text-amber-900 font-semibold flex items-center gap-2">
       <svg class="w-6 h-6" fill="currentColor" viewbox="0 0 20 20"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z" />
       </svg> Segnalibri</h2><button id="close-bookmarks" class="text-amber-600 hover:text-amber-800 p-2 rounded-full hover:bg-amber-100 transition-colors">
       <svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
       </svg></button>
     </div>
     <div id="bookmarks-list" class="space-y-2">
      <p class="text-amber-600 text-sm italic">Nessun segnalibro</p>
     </div>
    </div>
   </div><!-- Bookmarks Panel Overlay -->
   <div id="bookmarks-overlay" class="fixed inset-0 bg-black/30 z-30 hidden" onclick="closeBookmarksPanel()"></div><!-- Delete Confirmation Modal -->
   <div id="delete-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="confirm-delete bg-white rounded-xl p-6 shadow-2xl max-w-sm mx-4">
     <h3 class="serif-font text-xl text-amber-900 font-semibold mb-2">Conferma eliminazione</h3>
     <p id="delete-modal-text" class="text-gray-600 mb-4"></p>
     <div class="flex gap-3 justify-end"><button id="cancel-delete" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-colors"> Annulla </button> <button id="confirm-delete" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition-colors"> Elimina </button>
     </div>
    </div>
   </div>
  </div>
  <script>
    const STORAGE_KEY = 'agenda-pages';
    const STORAGE_ID_KEY = 'agenda-next-id';
    const STORAGE_BOOKMARKS_KEY = 'agenda-bookmarks';

    // State stored in memory and localStorage
    let pages = [];
    let currentPageIndex = -1; // -1 means showing cover
    let nextId = 1;
    let pendingDelete = null;
    let bookmarks = []; // Array of page IDs that are bookmarked

    // DOM Elements
    const pagesContainer = document.getElementById('pages-container');
    const bookCover = document.getElementById('book-cover');
    const pageIndicator = document.getElementById('page-indicator');
    const totalPagesEl = document.getElementById('total-pages');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const addPageBtn = document.getElementById('add-page-btn');
    const deleteAllBtn = document.getElementById('delete-all-btn');
    const deleteModal = document.getElementById('delete-modal');
    const deleteModalText = document.getElementById('delete-modal-text');
    const cancelDeleteBtn = document.getElementById('cancel-delete');
    const confirmDeleteBtn = document.getElementById('confirm-delete');
    const coverYear = document.getElementById('cover-year');

    // LocalStorage functions
    function saveToStorage() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(pages));
        localStorage.setItem(STORAGE_ID_KEY, nextId.toString());
        localStorage.setItem(STORAGE_BOOKMARKS_KEY, JSON.stringify(bookmarks));
      } catch (e) {
        showToast('Errore nel salvataggio', 'error');
      }
    }

    function loadFromStorage() {
      try {
        const savedPages = localStorage.getItem(STORAGE_KEY);
        const savedId = localStorage.getItem(STORAGE_ID_KEY);
        const savedBookmarks = localStorage.getItem(STORAGE_BOOKMARKS_KEY);

        if (savedPages) {
          pages = JSON.parse(savedPages);
        }

        if (savedId) {
          nextId = parseInt(savedId);
        }

        if (savedBookmarks) {
          bookmarks = JSON.parse(savedBookmarks);
        }
      } catch (e) {
        showToast('Errore nel caricamento dei dati', 'error');
      }
    }

    // Utility functions
    function formatDate(dateString) {
      const date = new Date(dateString);
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      return date.toLocaleDateString('it-IT', options);
    }

    function formatShortDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('it-IT', { day: '2-digit', month: 'short' });
    }

    function getTodayISO() {
      return new Date().toISOString().split('T')[0];
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast px-4 py-2 rounded-lg shadow-lg text-white ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
      toast.textContent = message;
      document.getElementById('toast-container').appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function toggleBookmark(pageId) {
      const index = bookmarks.indexOf(pageId);
      if (index > -1) {
        bookmarks.splice(index, 1);
        showToast('Segnalibro rimosso');
      } else {
        bookmarks.push(pageId);
        showToast('Segnalibro aggiunto');
      }
      saveToStorage();
      renderPages();
      renderBookmarksList();
    }

    function isBookmarked(pageId) {
      return bookmarks.includes(pageId);
    }

    function renderBookmarksList() {
      const bookmarksContainer = document.getElementById('bookmarks-list');
      const bookmarksCount = document.getElementById('bookmarks-count');

      bookmarksCount.textContent = bookmarks.length;

      if (bookmarks.length === 0) {
        bookmarksContainer.innerHTML = '<p class="text-amber-600 text-sm italic">Nessun segnalibro</p>';
        return;
      }

      const sortedPages = [...pages].sort((a, b) => new Date(a.date) - new Date(b.date));
      const bookmarkedPages = sortedPages.filter(p => bookmarks.includes(p.id));

      bookmarksContainer.innerHTML = bookmarkedPages.map(page => {
        const pageIndex = sortedPages.findIndex(p => p.id === page.id);
        return `
          <button 
            class="w-full text-left px-3 py-2 rounded-lg hover:bg-amber-100 transition-colors flex items-center justify-between group"
            onclick="goToBookmarkedPage(${pageIndex})"
          >
            <span class="serif-font text-amber-800 text-sm">${formatShortDate(page.date)}</span>
            <svg class="w-4 h-4 text-amber-600" fill="currentColor" viewBox="0 0 20 20">
              <path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"/>
            </svg>
          </button>
        `;
      }).join('');
    }

    function openBookmarksPanel() {
      document.getElementById('bookmarks-panel').style.transform = 'translateX(0)';
      document.getElementById('bookmarks-overlay').classList.remove('hidden');
    }

    function closeBookmarksPanel() {
      document.getElementById('bookmarks-panel').style.transform = 'translateX(100%)';
      document.getElementById('bookmarks-overlay').classList.add('hidden');
    }

    function goToBookmarkedPage(index) {
      closeBookmarksPanel();
      setTimeout(() => goToPage(index), 300);
    }

    function showDeleteModal(text, onConfirm) {
      deleteModalText.textContent = text;
      pendingDelete = onConfirm;
      deleteModal.classList.remove('hidden');
    }

    function hideDeleteModal() {
      deleteModal.classList.add('hidden');
      pendingDelete = null;
    }

    // Render functions
    function renderPages() {
      if (pages.length === 0) {
        bookCover.classList.remove('hidden');
        bookCover.style.opacity = '1';
        bookCover.style.pointerEvents = 'auto';
        pagesContainer.innerHTML = '';
        pageIndicator.textContent = 'Nessuna pagina';
        totalPagesEl.textContent = '';
        deleteAllBtn.classList.add('hidden');
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
      }

      deleteAllBtn.classList.remove('hidden');

      // Sort pages by date
      const sortedPages = [...pages].sort((a, b) => new Date(a.date) - new Date(b.date));

      // Render pages
      pagesContainer.innerHTML = sortedPages.map((page, index) => `
        <div class="page page-wrapper ${index < currentPageIndex ? 'flipped' : ''}" data-index="${index}" style="z-index: ${pages.length - index};">
          <div class="page-content spine-shadow w-full h-full p-6 relative">
            <div class="page-lines absolute inset-0 pointer-events-none"></div>
            <div class="relative z-10">
              <!-- Date Header -->
              <div class="date-header pb-2 mb-4 flex justify-between items-center">
                <div>
                  <div class="serif-font text-xl font-semibold capitalize">${formatDate(page.date)}</div>
                </div>
                <div class="flex gap-2">
                  <button 
                    class="text-amber-600 hover:text-amber-800 p-2 rounded-full hover:bg-amber-50 transition-all ${isBookmarked(page.id) ? '' : 'opacity-50'}" 
                    onclick="toggleBookmark(${page.id})"
                    title="${isBookmarked(page.id) ? 'Rimuovi segnalibro' : 'Aggiungi segnalibro'}"
                  >
                    <svg class="w-5 h-5" fill="${isBookmarked(page.id) ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
                    </svg>
                  </button>
                  <button class="delete-btn text-red-500 hover:text-red-700 p-2 rounded-full hover:bg-red-50 transition-all" onclick="deletePage(${page.id})">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                  </button>
                </div>
              </div>
              
              <!-- Content -->
              <div class="relative">
                <textarea 
                  class="handwriting text-xl w-full bg-transparent border-none outline-none resize-none text-amber-900 leading-8"
                  style="line-height: 32px; height: 500px; padding-top: 8px;"
                  placeholder="Scrivi qui i tuoi appunti..."
                  data-page-id="${page.id}"
                  oninput="savePageContent(${page.id}, this.value)"
                >${page.content || ''}</textarea>
                
                <!-- Page Number -->
                <div class="absolute bottom-2 right-2 serif-font text-amber-400 text-sm pointer-events-none">
                  ${index + 1}
                </div>
              </div>
            </div>
            <div class="page-curl"></div>
          </div>
        </div>
      `).join('');

      // Update cover visibility
      if (currentPageIndex === -1) {
        bookCover.classList.remove('hidden');
        bookCover.style.opacity = '1';
        bookCover.style.pointerEvents = 'auto';
      } else {
        bookCover.classList.add('hidden');
        bookCover.style.opacity = '0';
        bookCover.style.pointerEvents = 'none';
      }

      updateNavigation();
      renderBookmarksList();
    }

    function updateNavigation() {
      const total = pages.length;

      if (total === 0) {
        pageIndicator.textContent = 'Nessuna pagina';
        totalPagesEl.textContent = '';
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
      }

      if (currentPageIndex === -1) {
        pageIndicator.textContent = 'Copertina';
      } else {
        const sortedPages = [...pages].sort((a, b) => new Date(a.date) - new Date(b.date));
        pageIndicator.textContent = formatShortDate(sortedPages[currentPageIndex].date);
      }

      totalPagesEl.textContent = `${total} ${total === 1 ? 'pagina' : 'pagine'} totali`;

      prevBtn.disabled = currentPageIndex === -1;
      nextBtn.disabled = currentPageIndex >= pages.length - 1;
    }

    // Navigation
    function goToPage(index) {
      if (index < -1 || index >= pages.length) return;

      currentPageIndex = index;

      const pageElements = document.querySelectorAll('.page');
      pageElements.forEach((el, i) => {
        if (i < currentPageIndex) {
          el.classList.add('flipped');
        } else {
          el.classList.remove('flipped');
        }
      });

      // Update cover visibility
      if (currentPageIndex === -1) {
        bookCover.classList.remove('hidden');
        setTimeout(() => {
          bookCover.style.opacity = '1';
          bookCover.style.pointerEvents = 'auto';
        }, 10);
      } else {
        bookCover.style.opacity = '0';
        bookCover.style.pointerEvents = 'none';
        setTimeout(() => bookCover.classList.add('hidden'), 500);
      }

      updateNavigation();
      renderBookmarksList();
    }

    function nextPage() {
      if (currentPageIndex < pages.length - 1) {
        goToPage(currentPageIndex + 1);
      }
    }

    function prevPage() {
      if (currentPageIndex > -1) {
        goToPage(currentPageIndex - 1);
      }
    }

    // Data operations
    function addNewPage() {
      // Find next available date
      let newDate = getTodayISO();
      const existingDates = new Set(pages.map(p => p.date));
      let attempts = 0;
      while (existingDates.has(newDate) && attempts < 365) {
        const date = new Date(newDate);
        date.setDate(date.getDate() + 1);
        newDate = date.toISOString().split('T')[0];
        attempts++;
      }

      const newPage = {
        id: nextId++,
        date: newDate,
        content: ''
      };

      pages.push(newPage);
      saveToStorage();
      renderPages();
      showToast('Nuova pagina aggiunta!');

      // Navigate to the new page
      const sortedPages = [...pages].sort((a, b) => new Date(a.date) - new Date(b.date));
      const newIndex = sortedPages.findIndex(p => p.id === newPage.id);
      goToPage(newIndex);
    }

    function savePageContent(pageId, content) {
      const page = pages.find(p => p.id === pageId);
      if (page) {
        page.content = content;
        saveToStorage();
      }
    }

    function deletePage(pageId) {
      const page = pages.find(p => p.id === pageId);
      if (!page) return;

      showDeleteModal(
        `Vuoi eliminare la pagina del ${formatDate(page.date)}?`,
        () => {
          hideDeleteModal();
          pages = pages.filter(p => p.id !== pageId);

          // Remove from bookmarks if bookmarked
          const bookmarkIndex = bookmarks.indexOf(pageId);
          if (bookmarkIndex > -1) {
            bookmarks.splice(bookmarkIndex, 1);
          }

          if (currentPageIndex >= pages.length) {
            currentPageIndex = Math.max(-1, pages.length - 1);
          }

          saveToStorage();
          renderPages();
          showToast('Pagina eliminata');
        }
      );
    }

    function deleteAllPages() {
      if (pages.length === 0) return;

      showDeleteModal(
        `Vuoi eliminare tutte le ${pages.length} pagine? Questa azione non può essere annullata.`,
        () => {
          hideDeleteModal();
          pages = [];
          bookmarks = [];
          currentPageIndex = -1;
          saveToStorage();
          renderPages();
          showToast('Tutte le pagine eliminate');
        }
      );
    }

    // Event listeners
    prevBtn.addEventListener('click', prevPage);
    nextBtn.addEventListener('click', nextPage);
    addPageBtn.addEventListener('click', addNewPage);
    deleteAllBtn.addEventListener('click', deleteAllPages);
    cancelDeleteBtn.addEventListener('click', hideDeleteModal);
    confirmDeleteBtn.addEventListener('click', () => {
      if (pendingDelete) pendingDelete();
    });

    document.getElementById('bookmarks-toggle').addEventListener('click', openBookmarksPanel);
    document.getElementById('close-bookmarks').addEventListener('click', closeBookmarksPanel);

    bookCover.addEventListener('click', () => {
      if (pages.length > 0) {
        goToPage(0);
      }
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowRight') nextPage();
      if (e.key === 'ArrowLeft') prevPage();
    });

    // Initialize
    loadFromStorage();
    coverYear.textContent = new Date().getFullYear();
    renderPages();
    renderBookmarksList();
