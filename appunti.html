<!doctype html>
<html lang="it" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quaderno Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Blocco l'altezza del body per evitare lo scroll della pagina intera */
        body { 
            box-sizing: border-box; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            padding: 6px;
        }

        .grid-paper {
            background-image: 
                linear-gradient(to right, #e5e7eb 1px, transparent 1px),
                linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .notes-textarea {
            background-image: 
                linear-gradient(to right, #d1d5db 1px, transparent 1px),
                linear-gradient(to bottom, #d1d5db 1px, transparent 1px);
            background-size: 40px 40px;
            line-height: 40px;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            padding: 15px;
            /* Forza la textarea a prendersi tutto lo spazio */
            flex: 1;
            width: 100%;
            resize: none;
        }

        /* Container principale che occupa tutto lo spazio sotto l'header */
        .main-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1rem;
            flex: 1; 
            min-height: 0; /* Fondamentale per il corretto funzionamento di flex-grow */
        }

        .books-section {
            width: 100%;
            height: 250px; /* Altezza fissa su mobile per lasciare spazio sotto */
            flex-shrink: 0;
        }

        .notes-section {
            width: 100%;
            flex: 1; /* Espande l'area note al massimo */
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .book-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            height: 100%;
            overflow-y: auto;
        }

        .book-button { transition: all 0.3s ease; }
        .book-button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15); }
        .book-button.active { border-width: 4px !important; border-color: #2563eb !important; }

        /* Desktop layout */
        @media (min-width: 1024px) {
            .main-container {
                flex-direction: row;
                padding: 1.5rem;
            }
            .books-section {
                width: 320px;
                height: 100%;
            }
            .book-grid {
                grid-template-columns: 1fr;
            }
            .notes-textarea {
                font-size: 28px;
                background-size: 60px 60px;
                line-height: 60px;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 font-sans">

    <header class="bg-white shadow-lg rounded-b-2xl mx-4 mt-4 p-4 shrink-0">
        <div class="text-center">
            <h1 class="text-3xl font-bold text-blue-900 flex items-center justify-center gap-3">📝 <span>Quaderno Editor</span></h1>
        </div>
    </header>

    <div class="main-container max-w-7xl mx-auto w-full">
        <div class="books-section bg-white rounded-2xl shadow-lg flex flex-col overflow-hidden">
            <div class="p-3 border-b border-gray-200 bg-gradient-to-r from-blue-50 to-indigo-50">
                <h2 class="font-bold text-gray-800 flex items-center gap-2">📖 <span>I Miei Quaderni</span></h2>
            </div>
            <div class="flex-1 overflow-y-auto p-3">
                <div class="book-grid">
                    <button class="book-button bg-gradient-to-r from-blue-100 to-blue-200 rounded-lg border-2 border-blue-300 p-3" onclick="loadBook('Grammatica Cinese', this)">
                        <div class="flex flex-col items-center text-center"><span class="text-2xl">📒</span><h3 class="font-bold text-gray-800">Grammatica Cinese</h3></div>
                    </button>
                    <button class="book-button bg-gradient-to-r from-green-100 to-green-200 rounded-lg border-2 border-green-300 p-3" onclick="loadBook('Idee', this)">
                        <div class="flex flex-col items-center text-center"><span class="text-2xl">💡</span><h3 class="font-bold text-gray-800">Idee</h3></div>
                    </button>
                    <button class="book-button bg-gradient-to-r from-purple-100 to-purple-200 rounded-lg border-2 border-purple-300 p-3" onclick="loadBook('Vari', this)">
                        <div class="flex flex-col items-center text-center"><span class="text-2xl">🧾</span><h3 class="font-bold text-gray-800">Vari</h3></div>
                    </button>
                    <button class="book-button bg-gradient-to-r from-orange-100 to-orange-200 rounded-lg border-2 border-orange-300 p-3" onclick="loadBook('Coreano', this)">
                        <div class="flex flex-col items-center text-center"><span class="text-2xl">🏯</span><h3 class="font-bold text-gray-800">Coreano</h3></div>
                    </button>
                    <button class="book-button bg-gradient-to-r from-red-100 to-red-200 rounded-lg border-2 border-red-300 p-3" onclick="loadBook('Storie Cinesi', this)">
                        <div class="flex flex-col items-center text-center"><span class="text-2xl">🏮</span><h3 class="font-bold text-gray-8">Storie Cinesi</h3></div>
                    </button>
                    <button class="book-button bg-gradient-to-r from-teal-100 to-teal-200 rounded-lg border-2 border-teal-300 p-3" onclick="loadBook('Storie Coreane', this)">
                        <div class="flex flex-col items-center text-center"><span class="text-2xl">🥢</span><h3 class="font-bold text-gray-800">Storie Coreane</h3></div>
                    </button>
                    <button class="book-button bg-gradient-to-r from-pink-100 to-pink-200 rounded-lg border-2 border-pink-300 p-3" onclick="loadBook('Codici', this)">
                        <div class="flex flex-col items-center text-center"><span class="text-2xl">💻</span><h3 class="font-bold text-gray-800">Codici</h3></div>
                    </button>
                    <button class="book-button bg-gradient-to-r from-yellow-100 to-yellow-200 rounded-lg border-2 border-yellow-300 p-3" onclick="loadBook('Internet', this)">
                        <div class="flex flex-col items-center text-center"><span class="text-2xl">🌍</span><h3 class="font-bold text-gray-800">Internet</h3></div>
                    </button>
                </div>
            </div>
        </div>

        <div class="notes-section bg-white rounded-5x3 shadow-lg overflow-hidden border border-gray-200">
            <div class="p-4 border-b border-gray-200 bg-gradient-to-r from-green-50 to-emerald-50 shrink-0 flex justify-between items-center">
                <div>
                    <h2 id="current-book" class="font-bold text-lg text-gray-800">Note generali</h2>
                    <p id="save-status" class="text-xs text-gray-500">Quadretti extra-grandi</p>
                </div>
            </div>
            
            <div class="flex-1 flex flex-col overflow-hidden">
                <textarea id="notes-area" class="notes-textarea focus:outline-none" placeholder="Inizia a scrivere..."></textarea>
            </div>
        </div>
    </div>

    <script>
        let bookNotes = JSON.parse(localStorage.getItem('bookNotes') || '{}');
        let currentBook = 'general';

        function loadBook(title, btn) {
            currentBook = title;
            document.getElementById('notes-area').value = bookNotes[title] || '';
            document.getElementById('current-book').textContent = `Note per: ${title}`;
            
            document.querySelectorAll('.book-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function saveNotes() {
            bookNotes[currentBook] = document.getElementById('notes-area').value;
            localStorage.setItem('bookNotes', JSON.stringify(bookNotes));
            const status = document.getElementById('save-status');
            status.textContent = '✅ Salvato!';
            setTimeout(() => { status.textContent = 'Quadretti extra-grandi'; }, 1500);
        }

        let saveTimeout;
        document.getElementById('notes-area').addEventListener('input', () => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveNotes, 1000);
        });

        window.onload = () => {
            document.getElementById('notes-area').value = bookNotes['general'] || '';
        };
    </script>
</body>
</html>
