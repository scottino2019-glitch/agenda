<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROSSIMO EVENTO</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap');
    
    html, body {
      margin: 0;
      padding: 0;
      background-color: transparent;
      box-sizing: border-box;
      font-family: "Space Grotesk", sans-serif;
    }
    
    .badge-scroll-container::-webkit-scrollbar {
      display: none;
    }
    .badge-scroll-container {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .calendario-badge-root {
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s ease;
    }
    .calendario-badge-root:hover {
      transform: translateY(-5px);
      box-shadow: 10px 10px 0px 0px #000000 !important;
    }

    .calendario-badge-card {
      transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease, background-color 0.2s ease;
    }
    .calendario-badge-card:hover {
      transform: scale(1.02);
      background-color: rgba(255, 255, 255, 0.98) !important; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06) !important;
    }
  </style>
</head>
<body>

<div class="calendario-badge-root" style="
  position: relative;
  width: 100%;
  max-width: 320px;
  height: 400px;
  border-radius: 0px;
  border: 4px solid #000000;
  background-color: #FACC15;
  color: #000000;
  padding: 20px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-family: "Space Grotesk", sans-serif;
  box-shadow: 6px 6px 0px 0px #000000;
">
  <!-- Theme aesthetic background overlays -->
  
  
  

  
  <!-- Header -->
  <div style="position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; border-bottom: 1px solid rgba(0, 0, 0, 0.1); padding-bottom: 8px;">
    <div style="display: flex; align-items: center;">
      <span style="width: 10px; height: 10px; border-radius: 50%; background-color: #D946EF; display: inline-block; margin-right: 8px;"></span>
      <span style="font-size: 11px; font-weight: bold; letter-spacing: 0.05em; text-transform: uppercase; opacity: 0.85;">PROSSIMO EVENTO</span>
    </div>
    <span style="font-size: 10px; padding: 2px 8px; border-radius: 9999px; font-weight: bold; background-color: rgba(255, 94, 94, 0.15); color: #FF5E5E;">LIVE</span>
  </div>

  <!-- Event Content -->
  <div style="position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 0;">
    
    <div style="display: flex; flex-direction: column;">
      <div style="display: flex; align-items: center; margin-bottom: 12px;">
        <div class="calendario-badge-card" style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: 8px;
          min-width: 70px;
          height: 70px;
          box-sizing: border-box;
          text-align: center;
          margin-right: 12px;
          
        background-color: #FFFFFF;
        color: #000000;
        border: 2px solid #000000;
        border-radius: 0px;
        box-shadow: 3px 3px 0px 0px #000000;
      
        ">
          <span style="font-size: 10px; text-transform: uppercase; font-weight: bold; opacity: 0.75; margin-bottom: 1px; letter-spacing: 0.05em; line-height: 1;">Sab</span>
          <span style="font-size: 30px; font-weight: 900; line-height: 1; letter-spacing: -0.05em;">11</span>
          <span style="font-size: 10px; text-transform: uppercase; font-weight: 600; opacity: 0.9; margin-top: 1px; letter-spacing: 0.05em; line-height: 1;">Lugl</span>
        </div>
        <div style="flex: 1; min-width: 0; text-align: left;">
          <span style="font-size: 10px; background-color: #FDF2F8; color: #D946EF; padding: 2px 8px; border-radius: 9999px; font-weight: bold; display: inline-block; margin-bottom: 4px;">Importante</span>
          <div style="font-size: 12px; opacity: 0.8; font-weight: 500;">⏰ 16:30 - 19:30 CEST</div>
        </div>
      </div>
      <div class="calendario-badge-card" style="
        padding: 16px;
        box-sizing: border-box;
        text-align: left;
        overflow: hidden;
        
        background-color: #FFFFFF;
        color: #000000;
        border: 2px solid #000000;
        border-radius: 0px;
        box-shadow: 3px 3px 0px 0px #000000;
      
      ">
        <h3 style="margin: 0 0 6px 0; font-size: 15px; font-weight: bold; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
          Piani Studi:
        </h3>
        <p style="margin: 0; font-size: 12px; opacity: 0.75; line-height: 1.5; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;"><pre>
Cinese
Coreano
Russo
Programmazione </pre>
        </p>
      </div>
    </div>
  </div>

  <!-- Decorative Stickers -->
  
  <div style="
    position: absolute;
    left: 84%;
    top: 56%;
    transform: translate(-50%, -50%) rotate(15deg);
    width: 36px;
    height: 36px;
    z-index: 10;
    user-select: none;
  ">
    <svg viewBox="0 0 24 24" style="width: 100%; height: 100%; fill: #D946EF; display: block;">
      <path d="M12 2l2.4 5.6L20 10l-5.6 2.4L12 22l-2.4-5.6L4 14l5.6-2.4L12 2Z" />
    </svg>
  </div>

  <!-- Decorative Texts -->
  
  <div style="
    position: absolute;
    left: 14%;
    top: 18%;
    transform: translate(-50%, -50%) rotate(-12deg);
    font-size: 13px;
    color: #D946EF;
    font-weight: bold;
    z-index: 11;
    user-select: none;
    line-height: 1;
    white-space: nowrap;
    font-family: "Playfair Display", Georgia, serif;
  ">Nuovo!</div>

  <div style="position: relative; z-index: 1; margin-top: 16px; padding-top: 8px; border-top: 1px solid rgba(0, 0, 0, 0.08); font-size: 10px; opacity: 0.6; display: flex; justify-content: space-between;">
    <span>🗓️ Badge Calendario</span>
    <span>2026</span>
  </div>
</div>
</body>
</html>
